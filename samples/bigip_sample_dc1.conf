#TMSH-VERSION: 15.1.0

sys global-settings {
    hostname bigip-dc1.example.local
}

net vlan /Common/vlan-external {
    tag 100
}

net vlan /Common/vlan-internal {
    tag 200
}

ltm node /Common/10.1.1.10 {
    address 10.1.1.10
}

ltm node /Common/10.1.1.11 {
    address 10.1.1.11
}

ltm node /Common/10.1.2.20 {
    address 10.1.2.20
}

ltm pool /Common/pool_web_80 {
    load-balancing-mode round-robin
    members {
        /Common/10.1.1.10:80 {
            address 10.1.1.10
        }
        /Common/10.1.1.11:80 {
            address 10.1.1.11
        }
    }
    monitor /Common/http
}

ltm pool /Common/pool_app_8443 {
    load-balancing-mode least-connections-member
    members {
        /Common/10.1.2.20:8443 {
            address 10.1.2.20
        }
    }
    monitor /Common/https
}

ltm snatpool /Common/snat_pool_web {
    members {
        /Common/10.10.10.200
        /Common/10.10.10.201
    }
}

ltm snat-translation /Common/10.10.10.200 {
    address 10.10.10.200
}

ltm snat-translation /Common/10.10.10.201 {
    address 10.10.10.201
}

ltm virtual /Common/vs_web_443 {
    destination /Common/10.10.10.100:443
    ip-protocol tcp
    mask 255.255.255.255
    pool /Common/pool_web_80
    profiles {
        /Common/http { }
        /Common/clientssl {
            context clientside
        }
    }
    source 0.0.0.0/0
    source-address-translation {
        type automap
    }
    vlans {
        /Common/vlan-external
    }
    vlans-enabled
    description "Portail web public"
}

ltm virtual /Common/vs_app_8443 {
    destination /Common/10.10.10.110:8443
    ip-protocol tcp
    mask 255.255.255.255
    pool /Common/pool_app_8443
    profiles {
        /Common/tcp { }
    }
    source 10.50.0.0/16
    source-address-translation {
        type snat
        pool /Common/snat_pool_web
    }
    vlans {
        /Common/vlan-internal
    }
    vlans-enabled
    description "API interne partenaires"
}

ltm virtual /Common/vs_legacy_dsr {
    destination /Common/10.10.10.120:8080
    ip-protocol tcp
    mask 255.255.255.255
    pool /Common/pool_web_80
    profiles {
        /Common/fastL4 { }
    }
    source 0.0.0.0/0
    source-address-translation {
        type none
    }
    vlans-disabled
    description "Flux DSR sans SNAT (IP client preservee)"
}

security firewall rule-list /Common/rl_external_inbound {
    rules {
        allow_https_public {
            action accept
            ip-protocol tcp
            log yes
            source {
                addresses {
                    0.0.0.0/0 { }
                }
            }
            destination {
                addresses {
                    10.10.10.100 { }
                }
                ports {
                    443 { }
                }
            }
        }
        allow_partner_api {
            action accept
            ip-protocol tcp
            log yes
            source {
                addresses {
                    10.50.0.0/16 { }
                }
            }
            destination {
                addresses {
                    10.10.10.110 { }
                }
                ports {
                    8443 { }
                }
            }
        }
        drop_all_else {
            action drop
            ip-protocol any
            log yes
            source {
                addresses {
                    0.0.0.0/0 { }
                }
            }
            destination {
                addresses {
                    0.0.0.0/0 { }
                }
            }
        }
    }
}

gtm server /Common/dc1_server {
    virtual-servers {
        /Common/vs_web_443 {
            destination 10.10.10.100:443
        }
    }
}

gtm pool a /Common/gtm_pool_web {
    load-balancing-mode round-robin
    members {
        /Common/dc1_server:/Common/vs_web_443
    }
}

gtm wideip a /Common/www.example.com {
    pools {
        /Common/gtm_pool_web { }
    }
}
